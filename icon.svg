<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#3d0066"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="50%" style="stop-color:#c44dff"/>
      <stop offset="100%" style="stop-color:#6600ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 카메라 바디 -->
  <rect x="80" y="160" width="352" height="240" rx="32" fill="#220044" stroke="#ff6ec7" stroke-width="3"/>

  <!-- 뷰파인더 -->
  <rect x="100" y="140" width="80" height="28" rx="10" fill="#220044" stroke="#ff6ec7" stroke-width="2"/>

  <!-- 플래시 -->
  <rect x="330" y="143" width="40" height="18" rx="6" fill="#ffe0f7" opacity="0.7"/>

  <!-- 렌즈 외부 링 -->
  <circle cx="256" cy="285" r="90" fill="none" stroke="#ff6ec7" stroke-width="4" filter="url(#glow)" opacity="0.8"/>

  <!-- 렌즈 -->
  <circle cx="256" cy="285" r="75" fill="url(#lens)" opacity="0.9"/>

  <!-- 렌즈 내부 -->
  <circle cx="256" cy="285" r="52" fill="#1a0040"/>
  <circle cx="256" cy="285" r="36" fill="#0d001f"/>

  <!-- 렌즈 반사 -->
  <ellipse cx="238" cy="267" rx="14" ry="10" fill="url(#shine)" transform="rotate(-30 238 267)"/>

  <!-- 렌즈 내부 빛 점 -->
  <circle cx="268" cy="298" r="4" fill="#c44dff" opacity="0.5"/>

  <!-- 별 장식 (Y2K 감성) -->
  <text x="340" y="200" font-size="28" fill="#ff6ec7" opacity="0.9" filter="url(#glow)">★</text>
  <text x="108" y="215" font-size="18" fill="#c44dff" opacity="0.7">✦</text>
  <text x="370" y="370" font-size="16" fill="#ff6ec7" opacity="0.6">✦</text>

  <!-- 하단 텍스트 -->
  <text x="256" y="435" font-family="Arial Black, sans-serif" font-size="38" font-weight="900"
        fill="none" stroke="#ff6ec7" stroke-width="1.5" text-anchor="middle" letter-spacing="2"
        filter="url(#glow)">gotozeros</text>
  <text x="256" y="435" font-family="Arial Black, sans-serif" font-size="38" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.9">gotozeros</text>
</svg>
